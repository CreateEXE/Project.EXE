<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>EXE Renderer</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; padding:0; width:100%; height:100%; overflow:hidden;
              background:transparent; font-family: -apple-system, "Roboto", sans-serif;
              -webkit-tap-highlight-color: transparent; user-select:none; }
  #stage { position:absolute; inset:0; }
  /* character */
  #pet { position:absolute; left:50%; top:55%; transform:translate(-50%,-50%);
         width:62%; aspect-ratio:1; border-radius:50%;
         background:radial-gradient(circle at 35% 30%, #b8e5ff 0%, #7ab8ff 45%, #2d6ad6 100%);
         box-shadow: 0 8px 32px rgba(45,106,214,0.45), inset 0 -10px 30px rgba(0,0,0,0.25);
         transition: transform .35s cubic-bezier(.2,.9,.3,1.2), filter .35s; }
  #pet.thinking { animation: spin 1.6s linear infinite; }
  #pet.bounce   { animation: bounce .55s ease-in-out; }
  #pet.shake    { animation: shake .45s ease-in-out; }
  @keyframes spin   { to { transform:translate(-50%,-50%) rotate(360deg); } }
  @keyframes bounce { 0%,100%{transform:translate(-50%,-50%) scale(1);} 50%{transform:translate(-50%,-58%) scale(1.05);} }
  @keyframes shake  { 0%,100%{transform:translate(-50%,-50%) rotate(0);} 25%{transform:translate(-54%,-50%) rotate(-6deg);} 75%{transform:translate(-46%,-50%) rotate(6deg);} }

  /* face */
  #face { position:absolute; left:50%; top:55%; transform:translate(-50%,-50%);
          width:46%; aspect-ratio:1; pointer-events:none; }
  .eye  { position:absolute; top:36%; width:14%; height:14%; border-radius:50%;
          background:#0b0f17; transition: all .3s; }
  .eye.l { left:24%; } .eye.r { right:24%; }
  #mouth { position:absolute; left:50%; top:62%; transform:translateX(-50%);
           width:30%; height:12%; border-radius:0 0 100% 100% / 0 0 100% 100%;
           background:#0b0f17; transition: all .3s; }
  /* expressions */
  body[data-expr="joy"]      .eye  { transform:scaleY(.35); }
  body[data-expr="joy"]      #mouth{ height:18%; }
  body[data-expr="sadness"]  #mouth{ border-radius:100% 100% 0 0 / 100% 100% 0 0; height:8%; top:68%; }
  body[data-expr="anger"]    .eye.l{ transform:rotate(-20deg) scaleY(.6); }
  body[data-expr="anger"]    .eye.r{ transform:rotate(20deg)  scaleY(.6); }
  body[data-expr="anger"]    #mouth{ height:6%; border-radius:4px; }
  body[data-expr="surprise"] .eye  { transform:scale(1.3); }
  body[data-expr="surprise"] #mouth{ width:14%; height:14%; border-radius:50%; }
  body[data-expr="thinking"] .eye.r{ transform:scaleY(.2); }

  /* chat bubble */
  #bubble { position:absolute; left:6%; right:6%; top:6%;
            background:rgba(20,28,40,.92); color:#e6edf3;
            border:1px solid rgba(120,200,255,.35); border-radius:14px;
            padding:10px 14px; font-size:13px; line-height:1.4;
            opacity:0; transform:translateY(-6px); transition: all .25s;
            pointer-events:none; max-height:42%; overflow:auto; }
  #bubble.show { opacity:1; transform:translateY(0); }

  /* controls bar (close + chat toggle) */
  #controls { position:absolute; top:4px; right:4px; display:flex; gap:4px; }
  .ctrl { width:26px; height:26px; border:none; border-radius:50%;
          background:rgba(20,28,40,.85); color:#e6edf3; font-size:14px;
          line-height:26px; padding:0; cursor:pointer;
          box-shadow:0 2px 6px rgba(0,0,0,.3); }
  .ctrl:active { transform:scale(.92); }
  #close { background:rgba(180,40,60,.92); }

  /* input field */
  #inputbar { position:absolute; left:6%; right:6%; bottom:6%;
              display:none; gap:6px; }
  #inputbar.show { display:flex; }
  #txt { flex:1; min-width:0; padding:8px 12px; border-radius:18px;
         border:1px solid rgba(120,200,255,.35); background:rgba(20,28,40,.92);
         color:#e6edf3; font-size:13px; outline:none; }
  #send { padding:0 14px; border:none; border-radius:18px;
          background:#79c0ff; color:#0b0f17; font-weight:600; font-size:13px; }
  #loading { position:absolute; left:50%; bottom:8%; transform:translateX(-50%);
             color:#79c0ff; font-size:11px; opacity:0; transition:opacity .2s; }
  #loading.show { opacity:1; }
</style>
</head>
<body data-expr="neutral">
  <div id="stage">
    <div id="pet"></div>
    <div id="face">
      <div class="eye l"></div>
      <div class="eye r"></div>
      <div id="mouth"></div>
    </div>

    <div id="bubble"></div>

    <div id="controls">
      <button class="ctrl" id="chatBtn" title="Chat">\u270E</button>
      <button class="ctrl" id="close"   title="Close">\u00D7</button>
    </div>

    <div id="inputbar">
      <input id="txt" type="text" placeholder="Talk to Fait\u2026" autocomplete="off" />
      <button id="send">Send</button>
    </div>
    <div id="loading">thinking\u2026</div>
  </div>

<script>
(function(){
  var bubble = document.getElementById('bubble');
  var pet    = document.getElementById('pet');
  var loading= document.getElementById('loading');
  var inbar  = document.getElementById('inputbar');
  var txt    = document.getElementById('txt');
  var bubbleTimer = null;

  function hasBridge(){ return typeof window.EXEBridge !== 'undefined'; }
  function safe(fn){ try{ fn(); }catch(e){ if(hasBridge()) EXEBridge.onRendererError(1002, String(e)); } }

  window.EXERenderer = {
    setExpression: function(name, weight){
      document.body.setAttribute('data-expr', String(name||'neutral'));
    },
    triggerAnimation: function(name){
      pet.classList.remove('thinking','bounce','shake');
      if (name === 'thinking')                 pet.classList.add('thinking');
      else if (name === 'wave' || name === 'greeting' || name === 'nod') pet.classList.add('bounce');
      else if (name === 'shake')               pet.classList.add('shake');
    },
    displayText: function(text, ms){
      bubble.textContent = String(text||'');
      bubble.classList.add('show');
      if (bubbleTimer) clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(function(){ bubble.classList.remove('show'); }, Math.max(1500, ms|0));
    },
    setLoading: function(on){
      if (on) loading.classList.add('show'); else loading.classList.remove('show');
    },
    loadVRM: function(file){
      // 2D placeholder renderer — VRM files are not loaded here; the pet is CSS.
      if (hasBridge()) EXEBridge.onRendererReady();
    }
  };

  document.getElementById('close').addEventListener('click', function(){
    safe(function(){ if (hasBridge() && EXEBridge.requestClose) EXEBridge.requestClose(); });
  });

  document.getElementById('chatBtn').addEventListener('click', function(){
    inbar.classList.toggle('show');
    if (inbar.classList.contains('show')) setTimeout(function(){ txt.focus(); }, 60);
  });

  function submit(){
    var v = (txt.value||'').trim();
    if (!v) return;
    txt.value = '';
    safe(function(){ if (hasBridge()) EXEBridge.onUserInputSubmitted(v); });
    safe(function(){ if (hasBridge()) EXEBridge.requestHaptic(20); });
  }
  document.getElementById('send').addEventListener('click', submit);
  txt.addEventListener('keydown', function(e){ if (e.key === 'Enter') submit(); });

  // Tell the host we're ready as soon as DOM is mounted; loadVRM may follow.
  if (hasBridge()) {
    try { EXEBridge.onRendererReady(); } catch(_){}
  }
})();
</script>
</body>
</html>
