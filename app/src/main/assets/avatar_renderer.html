<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Avatar</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:transparent; }
  canvas { display:block; width:100%!important; height:100%!important; }
  #status {
    position:fixed; bottom:8px; left:0; right:0; text-align:center;
    font-family:sans-serif; font-size:11px; color:rgba(255,255,255,0.75);
    pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,0.9);
  }
</style>
</head>
<body>
<div id="status">Initializing…</div>

<!--
  UMD builds — no importmap, no ES modules, works on ALL Android WebViews.
  Files are bundled into assets/js/ by the CI workflow (no internet needed at runtime).
-->
<script src="js/three.min.js"></script>
<script src="js/three-vrm.js"></script>

<script>
// ─── Globals ─────────────────────────────────────────────────────────────────
var renderer, camera, scene, controls, clock;
var currentVRM = null;
var idleBlinkTimer = 2.0;
var blinkState = 'open', blinkProgress = 0;
var activeEmotes = {};
var breathPhase = 0;

// three-vrm 1.x exposes itself as THREE.VRM on the THREE global when loaded as UMD
// OR as window.THREE_VRM — check both.
var VRMLib = (typeof THREE_VRM !== 'undefined') ? THREE_VRM
           : (THREE && THREE.VRM) ? THREE
           : null;

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  if (!THREE) { setStatus('ERROR: three.js failed to load'); return; }

  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, premultipliedAlpha:false });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.setClearColor(0x000000, 0);
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  clock = new THREE.Clock();

  camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.01, 50);
  camera.position.set(0, 1.35, 2.8);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  var key = new THREE.DirectionalLight(0xfff4e0, 1.2);
  key.position.set(1, 2, 2);
  scene.add(key);
  var fill = new THREE.DirectionalLight(0xc0d8ff, 0.4);
  fill.position.set(-2, 1, -1);
  scene.add(fill);

  // OrbitControls — three-vrm UMD bundle includes it, or fall back to manual drag
  if (THREE.OrbitControls) {
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 1.0, 0);
    controls.minDistance = 0.5;
    controls.maxDistance = 8.0;
    controls.update();
  }

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
  setStatus('Ready');

  // Tell Kotlin the renderer is up regardless of model load state
  if (window.AndroidBridge) {
    window.AndroidBridge.onRendererReady();
  }
}

// ─── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  var delta = clock.getDelta();
  if (controls) controls.update();
  if (currentVRM) {
    updateBlink(delta);
    updateEmotes(delta);
    updateBreath(delta);
    currentVRM.update(delta);
  }
  renderer.render(scene, camera);
}

// ─── Blink ────────────────────────────────────────────────────────────────────
function updateBlink(delta) {
  idleBlinkTimer -= delta;
  if (blinkState === 'open' && idleBlinkTimer <= 0) { blinkState = 'closing'; blinkProgress = 0; }
  if (blinkState === 'closing') {
    blinkProgress = Math.min(blinkProgress + delta * 8, 1);
    setBlinkWeight(blinkProgress);
    if (blinkProgress >= 1) blinkState = 'opening';
  } else if (blinkState === 'opening') {
    blinkProgress = Math.max(blinkProgress - delta * 6, 0);
    setBlinkWeight(blinkProgress);
    if (blinkProgress <= 0) {
      blinkState = 'open';
      idleBlinkTimer = 2.0 + Math.random() * 3.0;
    }
  }
}

function setBlinkWeight(w) {
  if (!currentVRM || !currentVRM.blendShapeProxy) return;
  try { currentVRM.blendShapeProxy.setValue(THREE_VRM.VRMSchema.BlendShapePresetName.Blink, w); } catch(e){}
}

// ─── Emotes ───────────────────────────────────────────────────────────────────
function updateEmotes(delta) {
  if (!currentVRM || !currentVRM.blendShapeProxy) return;
  Object.keys(activeEmotes).forEach(function(name) {
    var state = activeEmotes[name];
    state.elapsed += delta;
    var fadeIn = 0.3, fadeOut = 0.4;
    var w;
    if (state.elapsed < fadeIn) w = state.elapsed / fadeIn;
    else if (state.elapsed < state.duration - fadeOut) w = 1.0;
    else w = Math.max(0, (state.duration - state.elapsed) / fadeOut);
    try { currentVRM.blendShapeProxy.setValue(name, w * state.weight); } catch(e){}
    if (state.elapsed >= state.duration) {
      try { currentVRM.blendShapeProxy.setValue(name, 0); } catch(e){}
      delete activeEmotes[name];
    }
  });
  currentVRM.blendShapeProxy.update();
}

// ─── Breath ───────────────────────────────────────────────────────────────────
function updateBreath(delta) {
  breathPhase += delta * 0.4;
  var t = Math.sin(breathPhase * Math.PI * 2) * 0.012;
  if (!currentVRM || !currentVRM.humanoid) return;
  var chest = currentVRM.humanoid.getBoneNode(THREE_VRM.VRMSchema.HumanoidBoneName.Chest)
           || currentVRM.humanoid.getBoneNode(THREE_VRM.VRMSchema.HumanoidBoneName.Spine);
  if (chest) chest.rotation.x = t;
}

// ─── Load model ───────────────────────────────────────────────────────────────
function loadModel(dataUrl) {
  setStatus('Loading…');

  if (currentVRM) {
    scene.remove(currentVRM.scene);
    THREE_VRM.VRMUtils.deepDispose(currentVRM.scene);
    currentVRM = null;
  }

  var loader = new THREE.GLTFLoader();

  // Register VRM plugin if available
  if (typeof THREE_VRM !== 'undefined' && THREE_VRM.VRMLoaderPlugin) {
    loader.register(function(parser) { return new THREE_VRM.VRMLoaderPlugin(parser); });
  }

  loader.load(
    dataUrl,
    function(gltf) {
      var vrm = gltf.userData.vrm;
      if (vrm) {
        currentVRM = vrm;
        // VRM 0.x faces away from camera — rotate it
        if (THREE_VRM && THREE_VRM.VRMUtils) {
          THREE_VRM.VRMUtils.rotateVRM0(vrm);
        }
        scene.add(vrm.scene);
        autoFrame(vrm.scene);
        idleBlinkTimer = 1.5;
        setStatus('');
        if (window.AndroidBridge) window.AndroidBridge.onModelLoaded(vrm.meta && vrm.meta.title ? vrm.meta.title : 'VRM');
      } else {
        // Plain GLB
        scene.add(gltf.scene);
        autoFrame(gltf.scene);
        if (gltf.animations && gltf.animations.length > 0) {
          var mixer = new THREE.AnimationMixer(gltf.scene);
          mixer.clipAction(gltf.animations[0]).play();
        }
        setStatus('');
        if (window.AndroidBridge) window.AndroidBridge.onModelLoaded('GLB');
      }
    },
    function(progress) {
      var pct = progress.total > 0 ? Math.round(100 * progress.loaded / progress.total) : '…';
      setStatus('Loading ' + pct + '%');
    },
    function(err) {
      var msg = err && err.message ? err.message : String(err);
      setStatus('Error: ' + msg);
      if (window.AndroidBridge) window.AndroidBridge.onModelError(msg);
    }
  );
}

// ─── Auto-frame camera ────────────────────────────────────────────────────────
function autoFrame(object) {
  var box = new THREE.Box3().setFromObject(object);
  var size = box.getSize(new THREE.Vector3());
  var center = box.getCenter(new THREE.Vector3());
  var targetY = center.y + size.y * 0.15;
  if (controls) {
    controls.target.set(center.x, targetY, center.z);
  }
  var dist = Math.max(size.x, size.y) * 1.4;
  camera.position.set(center.x, targetY + size.y * 0.1, center.z + dist);
  camera.near = dist / 100;
  camera.far = dist * 10;
  camera.updateProjectionMatrix();
  if (controls) controls.update();
}

// ─── Public API (called from Kotlin via evaluateJavascript) ──────────────────
window.AvatarAPI = {
  loadModel: function(url) { loadModel(url); },

  playExpression: function(presetName, weight, durationSec) {
    if (!currentVRM || !currentVRM.blendShapeProxy) return;
    // Map preset name string to VRMSchema enum value
    var key = presetName.charAt(0).toUpperCase() + presetName.slice(1).toLowerCase();
    var enumVal = THREE_VRM && THREE_VRM.VRMSchema
      ? (THREE_VRM.VRMSchema.BlendShapePresetName[key] || presetName)
      : presetName;
    activeEmotes[enumVal] = { weight: weight || 1.0, duration: durationSec || 3.0, elapsed: 0 };
  },

  resetExpression: function() {
    activeEmotes = {};
    if (currentVRM && currentVRM.blendShapeProxy) {
      currentVRM.blendShapeProxy.reset();
    }
  },

  lookAt: function(x, y) {
    if (!currentVRM || !currentVRM.lookAt) return;
    currentVRM.lookAt.lookAt(new THREE.Vector3(x * 2, 1.4 + y, -3));
  },

  setFraming: function(mode) {
    if (!currentVRM) return;
    var box = new THREE.Box3().setFromObject(currentVRM.scene);
    var size = box.getSize(new THREE.Vector3());
    var center = box.getCenter(new THREE.Vector3());
    if (mode === 'face') {
      if (controls) controls.target.set(center.x, center.y + size.y * 0.35, center.z);
      camera.position.set(center.x, center.y + size.y * 0.35, center.z + size.y * 0.6);
    } else if (mode === 'full') {
      if (controls) controls.target.set(center.x, center.y, center.z);
      camera.position.set(center.x, center.y + size.y * 0.1, center.z + size.y * 1.6);
    } else {
      autoFrame(currentVRM.scene);
    }
    camera.updateProjectionMatrix();
    if (controls) controls.update();
  }
};

// Start as soon as DOM is ready
window.addEventListener('load', init);
</script>
</body>
</html>
