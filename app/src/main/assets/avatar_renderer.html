<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Renderer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
    background: transparent;
  }
  #status {
    position: fixed;
    bottom: 4px; left: 0; right: 0;
    text-align: center;
    font: 10px/1.4 monospace;
    color: rgba(255,255,255,0.7);
    pointer-events: none;
    text-shadow: 0 1px 3px #000;
  }
</style>

<!--
  importmap resolved by the CI/build step which copies these files into assets/js/.
  Paths are relative to the HTML file inside file:///android_asset/.
-->
<script type="importmap">
{
  "imports": {
    "three":          "./js/three.module.js",
    "three/addons/":  "./js/",
    "@pixiv/three-vrm": "./js/three-vrm.module.min.js"
  }
}
</script>
</head>
<body>

<canvas id="c"></canvas>
<div id="status">Loading…</div>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────────
// Imports
// ─────────────────────────────────────────────────────────────────────────────
import * as THREE from 'three';
import { GLTFLoader }   from 'three/addons/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

// ─────────────────────────────────────────────────────────────────────────────
// Renderer setup — transparent background
// ─────────────────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const statusEl = document.getElementById('status');

const renderer = new THREE.WebGLRenderer({
  canvas,
  alpha:      true,   // transparent background
  antialias:  true,
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);   // fully transparent
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = false;    // off for perf on mobile

// ─────────────────────────────────────────────────────────────────────────────
// Scene & Camera
// ─────────────────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  30,
  window.innerWidth / window.innerHeight,
  0.1,
  20
);

// Default framing: "bust" — head + shoulders
setCameraFraming('bust');

// Lighting — soft studio rig that works on VRM PBR materials
const hemi = new THREE.HemisphereLight(0xffffff, 0x8888aa, 0.8);
scene.add(hemi);

const key = new THREE.DirectionalLight(0xfff5e0, 1.2);
key.position.set(1.2, 2, 1.5);
scene.add(key);

const fill = new THREE.DirectionalLight(0xc0d8ff, 0.4);
fill.position.set(-1.5, 1, -1);
scene.add(fill);

// ─────────────────────────────────────────────────────────────────────────────
// VRM state
// ─────────────────────────────────────────────────────────────────────────────
let currentVRM   = null;   // VRMLoaderPlugin result
let currentModel = null;   // THREE.Group

// Animation clock
const clock = new THREE.Clock();

// Procedural idle state
const idle = {
  breathPhase:   0,
  blinkTimer:    0,
  nextBlink:     3.0,   // seconds until next blink
  blinkActive:   false,
  blinkT:        0,
};

// Expression accumulator — tracks what's currently applied so we can fade
let activeExpressionName   = null;
let activeExpressionWeight = 0;

// ─────────────────────────────────────────────────────────────────────────────
// GLTFLoader with VRM plugin
// ─────────────────────────────────────────────────────────────────────────────
const loader = new GLTFLoader();
loader.register(parser => new VRMLoaderPlugin(parser, {
  // helperRoot: scene,  // uncomment to show VRM bone helpers during debug
  autoUpdateHumanBones: true,
}));

// ─────────────────────────────────────────────────────────────────────────────
// Public API — called by Kotlin via evaluateJavascript()
// ─────────────────────────────────────────────────────────────────────────────
window.AvatarAPI = {

  /**
   * loadModel(dataUri)
   * dataUri: a data:model/gltf-binary;base64,… URI built in Kotlin
   */
  loadModel(dataUri) {
    setStatus('Loading model…');

    // Remove old model
    if (currentModel) {
      scene.remove(currentModel);
      if (currentVRM) VRMUtils.deepDispose(currentVRM.scene);
      currentVRM   = null;
      currentModel = null;
    }

    loader.load(
      dataUri,
      gltf => {
        const vrm = gltf.userData.vrm;
        if (!vrm) {
          // Plain GLB/GLTF (no VRM extension)
          currentModel = gltf.scene;
          scene.add(currentModel);
          fitModelToView(currentModel);
          setStatus('');
          notifyKotlin('onModelLoaded', gltf.scene.name || 'model.glb');
          return;
        }

        // VRM path
        currentVRM   = vrm;
        currentModel = vrm.scene;

        // VRM 0.x models face +Z; rotate to face camera (-Z)
        VRMUtils.rotateVRM0(vrm);

        scene.add(currentModel);

        // Reset idle state
        Object.assign(idle, {
          breathPhase: 0, blinkTimer: 0, nextBlink: 3,
          blinkActive: false, blinkT: 0,
        });
        activeExpressionName   = null;
        activeExpressionWeight = 0;

        // Apply current framing after model loads
        setCameraFraming(currentFraming);

        setStatus('');
        notifyKotlin('onModelLoaded', vrm.meta?.title || vrm.meta?.name || 'avatar.vrm');
      },
      xhr => {
        const pct = xhr.total ? Math.round(xhr.loaded / xhr.total * 100) : '?';
        setStatus(`Loading… ${pct}%`);
      },
      err => {
        const msg = err?.message || String(err);
        console.error('VRM load error:', msg);
        setStatus('Error: ' + msg);
        notifyKotlin('onModelError', msg);
      }
    );
  },

  /**
   * playExpression(name, weight, durationSec)
   * name: VRM expression preset name ('happy','angry','blink', etc.)
   */
  playExpression(name, weight = 1.0, durationSec = 2.0) {
    if (!currentVRM?.expressionManager) return;
    activeExpressionName   = name;
    activeExpressionWeight = weight;
    // Auto-reset after duration
    if (durationSec > 0) {
      setTimeout(() => {
        if (activeExpressionName === name) {
          activeExpressionName   = null;
          activeExpressionWeight = 0;
        }
      }, durationSec * 1000);
    }
  },

  resetExpression() {
    activeExpressionName   = null;
    activeExpressionWeight = 0;
    if (currentVRM?.expressionManager) {
      // Zero out all presets
      for (const name of ['happy','angry','sad','surprised','relaxed','blink','blinkLeft','blinkRight','aa','ih','ou','ee','oh']) {
        try { currentVRM.expressionManager.setValue(name, 0); } catch(_) {}
      }
    }
  },

  /**
   * lookAt(normX, normY)  — screen-space coordinates 0..1
   */
  lookAt(normX, normY) {
    if (!currentVRM?.lookAt) return;
    // Convert screen coords to world direction
    const worldX = (normX - 0.5) * 2;
    const worldY = -(normY - 0.5) * 2;
    currentVRM.lookAt.target = new THREE.Vector3(worldX, worldY + 1.5, 2);
  },

  /**
   * setFraming(mode)  — 'bust' | 'full' | 'face'
   */
  setFraming(mode) {
    setCameraFraming(mode);
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// Camera framing helpers
// ─────────────────────────────────────────────────────────────────────────────
let currentFraming = 'bust';

function setCameraFraming(mode) {
  currentFraming = mode;
  switch (mode) {
    case 'full':
      // Full body: camera back, centred at hip height (~0.9 m)
      camera.position.set(0, 0.9, 3.2);
      camera.lookAt(0, 0.9, 0);
      break;
    case 'face':
      // Close-up face shot
      camera.position.set(0, 1.55, 0.9);
      camera.lookAt(0, 1.55, 0);
      break;
    case 'bust':
    default:
      // Bust: head + shoulders, avatar ~1.6 m tall
      camera.position.set(0, 1.35, 1.8);
      camera.lookAt(0, 1.35, 0);
      break;
  }
}

function fitModelToView(model) {
  // For plain GLB (not VRM) — auto-fit bounding box
  const box = new THREE.Box3().setFromObject(model);
  const centre = box.getCenter(new THREE.Vector3());
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist   = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)));
  camera.position.set(centre.x, centre.y, centre.z + dist * 1.2);
  camera.lookAt(centre);
}

// ─────────────────────────────────────────────────────────────────────────────
// Resize handler
// ─────────────────────────────────────────────────────────────────────────────
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

// ─────────────────────────────────────────────────────────────────────────────
// Procedural idle animation tick (runs every frame)
// ─────────────────────────────────────────────────────────────────────────────
function tickIdle(delta) {
  if (!currentVRM) return;
  const em = currentVRM.expressionManager;
  const hb = currentVRM.humanoid;

  // ── Breathing: sway spine/chest along X ───────────────────────────────────
  idle.breathPhase += delta * 0.35;   // ~0.35 Hz
  const breathAmt = Math.sin(idle.breathPhase * Math.PI * 2) * 0.025;

  if (hb) {
    applyBoneEuler(hb, 'spine', breathAmt, 0, 0);
    applyBoneEuler(hb, 'chest', breathAmt * 0.4, 0, 0);

    // Gentle head micro-sway
    const headNod = Math.sin(idle.breathPhase * Math.PI * 2 * 0.5)  * 0.012;
    const headYaw = Math.sin(idle.breathPhase * Math.PI * 2 * 0.37) * 0.008;
    applyBoneEuler(hb, 'head', headNod, headYaw, 0);
  }

  // ── Blink ─────────────────────────────────────────────────────────────────
  if (em) {
    idle.blinkTimer += delta;
    if (!idle.blinkActive && idle.blinkTimer >= idle.nextBlink) {
      idle.blinkActive = true;
      idle.blinkT      = 0;
      idle.nextBlink   = idle.blinkTimer + 2.5 + Math.random() * 4.0;
    }

    if (idle.blinkActive) {
      idle.blinkT += delta;
      const BLINK_DUR = 0.12;
      let blinkW;
      if (idle.blinkT < BLINK_DUR * 0.5) {
        blinkW = idle.blinkT / (BLINK_DUR * 0.5);
      } else if (idle.blinkT < BLINK_DUR) {
        blinkW = 1 - (idle.blinkT - BLINK_DUR * 0.5) / (BLINK_DUR * 0.5);
      } else {
        blinkW = 0;
        idle.blinkActive = false;
      }
      // Apply to all three blink presets (whichever the VRM has)
      safeSetExpression(em, 'blink',      blinkW);
      safeSetExpression(em, 'blinkLeft',  blinkW);
      safeSetExpression(em, 'blinkRight', blinkW);
    } else {
      safeSetExpression(em, 'blink',      0);
      safeSetExpression(em, 'blinkLeft',  0);
      safeSetExpression(em, 'blinkRight', 0);
    }

    // ── Active expression (from playExpression API) ────────────────────────
    if (activeExpressionName) {
      safeSetExpression(em, activeExpressionName, activeExpressionWeight);
    }
  }
}

function applyBoneEuler(humanoid, boneName, rx, ry, rz) {
  try {
    const bone = humanoid.getNormalizedBoneNode(boneName);
    if (!bone) return;
    bone.rotation.x = rx;
    bone.rotation.y = ry;
    bone.rotation.z = rz;
  } catch (_) {}
}

function safeSetExpression(em, name, value) {
  try { em.setValue(name, value); } catch(_) {}
}

// ─────────────────────────────────────────────────────────────────────────────
// Render loop
// ─────────────────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05); // cap at 50 ms to avoid spiral on tab-hide

  if (currentVRM) {
    tickIdle(delta);
    currentVRM.update(delta);   // VRM spring bones + look-at
  }

  renderer.render(scene, camera);
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────
function setStatus(msg) {
  statusEl.textContent = msg;
}

function notifyKotlin(method, arg) {
  try {
    window.AndroidBridge[method](arg);
  } catch(e) {
    console.warn('AndroidBridge.' + method + ' not available:', e);
  }
}

// Tell Kotlin the renderer is ready to receive loadModel() calls
function onReady() {
  setStatus('');
  animate();
  notifyKotlin('onRendererReady', '');
}

// Wait for DOM + importmap resolution before signalling ready
if (document.readyState === 'complete') {
  onReady();
} else {
  window.addEventListener('load', onReady);
}
</script>
</body>
</html>
