name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone llama.cpp
        run: |
          git clone --depth=1 \
            https://github.com/ggml-org/llama.cpp \
            app/src/main/cpp/llama.cpp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "NDK_VERSION=26.3.11579264" >> $GITHUB_ENV

      - name: Accept licenses
        run: yes | sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT || true

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT"                              >  local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"   >> local.properties

      # ── THIS IS THE NEW STEP ───────────────────────────────────────────────
      # gradle-wrapper.jar is a binary that must exist for gradlew to boot.
      # Rather than committing a binary to git, we download it from Gradle's
      # own GitHub repo at the exact version pinned in gradle-wrapper.properties.
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper jar size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-exe-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "Android.EXE ${{ github.ref_name }}"
          body: |
            Debug build of Android.EXE
            Built automatically by GitHub Actions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
