name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false   # llama.cpp cloned separately below (faster, shallow)

      # ── 2. Clone llama.cpp (shallow) ──────────────────────────────────────
      - name: Clone llama.cpp
        run: |
          git clone --depth=1 \
            https://github.com/ggml-org/llama.cpp \
            app/src/main/cpp/llama.cpp

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 4. Gradle 8.6 ─────────────────────────────────────────────────────
      - name: Set up Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      # ── 5. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. NDK 26 + CMake 3.22 ────────────────────────────────────────────
      - name: Install NDK 26 and CMake 3.22
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      # ── 7. Accept SDK licenses ────────────────────────────────────────────
      - name: Accept licenses
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      # ── 8. Bundle JS libraries into assets (offline renderer) ─────────────
      #
      # FIXES vs original workflow:
      #   • three@0.152.2/build/three.min.js    → three@0.164.1  (version bump)
      #     three.min.js (UMD) was removed after r151; app uses ESM importmap,
      #     so the correct file is three.module.js
      #   • @pixiv/three-vrm@1.0.11/lib/three-vrm.js
      #                                          → @pixiv/three-vrm@2.1.2
      #     v2 has a completely different API; bundle path is
      #     three-vrm.module.min.js, not three-vrm.js
      #   • GLTFLoader.js was missing (needed by avatar_renderer.html)
      #   • OrbitControls.js was missing (imported in HTML)
      #   • Use `npm install` instead of bare curl — verified checksums,
      #     no CDN 404 races; files come straight from npm registry
      #
      # VERSION PIN RATIONALE:
      #   @pixiv/three-vrm@2.1.2 declares peer: three@"^0.164.1"
      #   Semver ^0.164.1 = >=0.164.1 <0.165.0, so three@0.165.0 is REJECTED
      #   (that was the ERESOLVE error in the previous run).
      #   Solution: pin three to 0.164.1 — the exact version three-vrm 2.1.2 tested against.
      #
      - name: Bundle JS libraries into assets (offline renderer)
        run: |
          mkdir -p app/src/main/assets/js

          # Install both packages into a temp prefix (no package.json needed)
          # three@0.164.1 satisfies @pixiv/three-vrm@2.1.2's peer dep ^0.164.1
          npm install --prefix /tmp/npm-js \
            three@0.164.1 \
            @pixiv/three-vrm@2.1.2

          NPM=/tmp/npm-js/node_modules

          # three.js r164 — ESM build (importmap "three" → this file)
          cp "$NPM/three/build/three.module.js" \
             app/src/main/assets/js/three.module.js

          # three-vrm 2.1.2 — ESM minified (importmap "@pixiv/three-vrm")
          cp "$NPM/@pixiv/three-vrm/lib/three-vrm.module.min.js" \
             app/src/main/assets/js/three-vrm.module.min.js

          # GLTFLoader — needed by avatar_renderer.html to parse .glb / .vrm
          cp "$NPM/three/examples/jsm/loaders/GLTFLoader.js" \
             app/src/main/assets/js/GLTFLoader.js

          # OrbitControls — imported by avatar_renderer.html (three/addons/ alias)
          cp "$NPM/three/examples/jsm/controls/OrbitControls.js" \
             app/src/main/assets/js/OrbitControls.js

          echo "JS assets bundled:"
          ls -lh app/src/main/assets/js/

      # ── 9. Regenerate gradle wrapper jar ──────────────────────────────────
      #
      # FIX: gradle/wrapper/gradle-wrapper.jar is a binary that is gitignored
      #      (not committed to the repo). Without it ./gradlew crashes
      #      immediately with "Could not find or load main class" (blank class
      #      name) before Gradle even starts.
      #
      #      setup-gradle@v4 already provisioned a full Gradle 8.6 installation.
      #      We use that `gradle` binary to run `gradle wrapper`, which writes a
      #      fresh verified gradle-wrapper.jar into gradle/wrapper/ in-place.
      #      After this step ./gradlew works normally.
      #
      - name: Regenerate gradle wrapper jar
        run: |
          GRADLE_BIN=$(find /home/runner/work/_temp/.gradle-actions/gradle-installations/installs \
            -name "gradle" -type f 2>/dev/null | head -1)
          echo "Using gradle binary: $GRADLE_BIN"
          "$GRADLE_BIN" wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew
          ls -lh gradle/wrapper/gradle-wrapper.jar

      # ── 10. Build debug APK ───────────────────────────────────────────────
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            -Pandroid.ndkVersion=26.3.11579264 \
            --stacktrace \
            --no-daemon

      # ── 11. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-exe-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
