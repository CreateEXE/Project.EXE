name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clone llama.cpp
        run: |
          git clone --depth=1 \
            https://github.com/ggml-org/llama.cpp \
            app/src/main/cpp/llama.cpp
          echo "✓ llama.cpp: $(ls app/src/main/cpp/llama.cpp | head -5 | tr '\n' ' ')"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26 and CMake 3.22
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "NDK_VERSION=26.3.11579264" >> "$GITHUB_ENV"

      - name: Accept licenses
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses || true

      - name: Write local.properties
        run: |
          cat > local.properties <<EOF
          sdk.dir=$ANDROID_SDK_ROOT
          ndk.dir=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION
          EOF

      - name: Build debug APK
        run: |
          gradle assembleDebug \
            --stacktrace \
            --info \
            -Pandroid.suppressUnsupportedCompileSdk=36
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.daemon=false
            -Dorg.gradle.workers.max=2
            -Xmx3500m
            -Dkotlin.incremental=false

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-exe-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "Project.EXE ${{ github.ref_name }}"
          body: |
            Debug APK — built automatically by GitHub Actions.
            Install with "Install unknown apps" enabled for your browser.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
