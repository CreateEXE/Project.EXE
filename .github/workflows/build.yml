name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clone llama.cpp
        run: |
          git clone --depth=1 \
            https://github.com/ggml-org/llama.cpp \
            app/src/main/cpp/llama.cpp

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26 and CMake 3.22
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "NDK_VERSION=26.3.11579264" >> "$GITHUB_ENV"

      - name: Accept licenses
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Bundle JS libraries into assets (offline renderer)
        run: |
          mkdir -p app/src/main/assets/js

          # three.js r152 — UMD build, no importmap needed
          curl -fsSL "https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js" \
            -o app/src/main/assets/js/three.min.js

          # three-vrm 1.0.11 — last version with UMD build, handles VRM 0.x and 1.x
          curl -fsSL "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.11/lib/three-vrm.js" \
            -o app/src/main/assets/js/three-vrm.js

          echo "JS assets bundled:"
          ls -lh app/src/main/assets/js/

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> local.properties

      - name: Build debug APK
        run: |
          gradle assembleDebug --stacktrace
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.daemon=false
            -Dorg.gradle.workers.max=2
            -Xmx3500m
            -Dkotlin.incremental=false

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ProjectEXE-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "Project.EXE ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
