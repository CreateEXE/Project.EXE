name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false   # llama.cpp cloned separately below (faster, shallow)

      # ── 2. Clone llama.cpp (shallow) ──────────────────────────────────────
      - name: Clone llama.cpp
        run: |
          git clone --depth=1 \
            https://github.com/ggml-org/llama.cpp \
            app/src/main/cpp/llama.cpp

      # ── 3. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 4. Gradle 8.6 ─────────────────────────────────────────────────────
      - name: Set up Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      # ── 5. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. NDK 26 + CMake 3.22 ────────────────────────────────────────────
      - name: Install NDK 26 and CMake 3.22
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | "$SDKMANAGER" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1" \
            "build-tools;34.0.0" \
            "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> "$GITHUB_ENV"

      # ── 7. Accept SDK licenses ────────────────────────────────────────────
      - name: Accept licenses
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      # ── 8. Bundle JS libraries into assets (offline renderer) ─────────────
      #
      # FIXES vs original workflow:
      #   • three@0.152.2/build/three.min.js    → three@0.165.0  (version bump)
      #     three.min.js (UMD) was removed after r151; app uses ESM importmap,
      #     so the correct file is three.module.js
      #   • @pixiv/three-vrm@1.0.11/lib/three-vrm.js
      #                                          → @pixiv/three-vrm@2.1.2
      #     v2 has a completely different API; bundle path is
      #     three-vrm.module.min.js, not three-vrm.js
      #   • GLTFLoader.js was missing (needed by avatar_renderer.html)
      #   • OrbitControls.js was missing (imported in HTML)
      #   • Use `npm install` instead of bare curl — verified checksums,
      #     no CDN 404 races; files come straight from npm registry
      #
      - name: Bundle JS libraries into assets (offline renderer)
        run: |
          mkdir -p app/src/main/assets/js

          # Install both packages into a temp prefix (no package.json needed)
          npm install --prefix /tmp/npm-js \
            three@0.165.0 \
            @pixiv/three-vrm@2.1.2

          NPM=/tmp/npm-js/node_modules

          # three.js r165 — ESM build (importmap "three" → this file)
          cp "$NPM/three/build/three.module.js" \
             app/src/main/assets/js/three.module.js

          # three-vrm 2.1.2 — ESM minified (importmap "@pixiv/three-vrm")
          cp "$NPM/@pixiv/three-vrm/lib/three-vrm.module.min.js" \
             app/src/main/assets/js/three-vrm.module.min.js

          # GLTFLoader — needed by avatar_renderer.html to parse .glb / .vrm
          cp "$NPM/three/examples/jsm/loaders/GLTFLoader.js" \
             app/src/main/assets/js/GLTFLoader.js

          # OrbitControls — imported by avatar_renderer.html (three/addons/ alias)
          cp "$NPM/three/examples/jsm/controls/OrbitControls.js" \
             app/src/main/assets/js/OrbitControls.js

          echo "JS assets bundled:"
          ls -lh app/src/main/assets/js/

      # ── 9. Build debug APK ────────────────────────────────────────────────
      #
      # FIX: This step was completely absent from the original workflow.
      #      The CI set up every tool, failed on the JS step, and produced
      #      no APK. assembleDebug is the actual build command.
      #
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -Pandroid.ndkVersion=26.3.11579264 \
            --stacktrace \
            --no-daemon

      # ── 10. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-exe-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
